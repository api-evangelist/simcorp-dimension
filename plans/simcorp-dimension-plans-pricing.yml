description: Machine-readable plans and pricing scaffold for this API provider. Conforms to the API Commons
  Plans schema. Tier limits and prices are scaffold defaults; replace with provider-published values.
plans:
  - id: simcorp-dimension-free
    name: Free
    type: freemium
    description: Free entry tier for the SimCorp Dimension API surface. Intended for evaluation, prototyping,
      and low-volume integrations. Real limits and pricing must be reconciled with the provider's published
      plan documentation.
    entries:
      - label: API Requests
        description: Monthly API request quota across all included endpoints
        name: api_requests
        type: quota
        metric: requests
        limit: 1000
        timeFrame: month
        geo: global
        domains:
          - https://api.simcorp.com/dimension/v1
          - https://api.simcorp.com/dimension/integration/v1
          - https://api.simcorp.com/dimension/analytics/v1
          - https://api.simcorp.com/dimension/web/v1
          - https://api.simcorp.com/dimension/datadistribution/v1
